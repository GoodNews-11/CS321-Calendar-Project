<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WeatherSync Calendar - Register</title>
    <link rel="stylesheet" href="style-register.css">
</head>
<body>

<div class="login-box">
    <h3>Create Account</h3>

    <form id="registerForm">

        <div class="login-input">
            <input type="text" id="regName" class="mytext" placeholder="Full Name" required>
        </div>

        <div class="login-input">
            <input type="email" id="regEmail" class="mytext" placeholder="Email" required>
        </div>

        <div class="login-input">
            <input type="password" id="regPassword" class="mytext" placeholder="Password" required>
        </div>

        <div class="login-input">
            <input type="password" id="regConfirm" class="mytext" placeholder="Re-enter Password" required>
        </div>

        <div class="show-password-row">
            <label>
                <input type="checkbox" id="showRegisterPassword">
                Show password
            </label>
        </div>

        <a href="login.html" class="login-box-account create-link">
            Already have an account?
        </a>

        <button type="submit" class="auth-submit-btn">Register</button>
    </form>
</div>

<script>
const regPassword = document.getElementById("regPassword");
const regConfirm = document.getElementById("regConfirm");
const showRegisterPassword = document.getElementById("showRegisterPassword");

showRegisterPassword.addEventListener("change", function () {
    const type = this.checked ? "text" : "password";
    regPassword.type = type;
    regConfirm.type = type;
});

document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const name = document.getElementById("regName").value.trim();
    const email = document.getElementById("regEmail").value.trim();
    const password = regPassword.value;
    const confirm = regConfirm.value;

    if (password !== confirm) {
        alert("Passwords do not match!");
        return;
    }

    try {
        const response = await fetch("http://localhost:5000/api/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name,
                email,
                password
            })
        });

        const data = await response.json();
        console.log("REGISTER RESPONSE:", data);

        if (!response.ok) {
            alert(data.message || "Register failed");
            return;
        }

        localStorage.setItem("token", data.token);

        if (data.user) {
            localStorage.setItem("currentCustomer", JSON.stringify(data.user));
        }

        alert("Register successful");
        window.location.href = "index.html";
    } catch (error) {
        console.error("REGISTER ERROR:", error);
        alert("Could not connect to backend");
    }
});
</script>

</body>
</html>
