<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calendar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h3>Calendar</h3>

    <div id="choice-banner">
        <span>Reminder</span>
        <span>Weather</span>
        <span>Task</span>
        <span>Theme</span>
    </div>

    <div class="auth-buttons">
        <button class="signin-up-btn"><a href="login.html">Sign In</a></button>
        <button class="signin-up-btn"><a href="register.html">Register</a></button>
    </div>
</header>

<div class="container">

    <div class="calendar">

        <!-- TITLE FIX -->
        <h2 id="title"></h2>

        <!-- FIX: replaced MonthYear with div -->
        <div id="MMYY-selection">
            <div>
                <button onclick="prev()">&larr;</button>
                <select id="monthSelect" onchange="changeMonth()"></select>
                <button onclick="next()">&rarr;</button>
            </div>

            <div>
                <button onclick="prevYear()">&larr;</button>
                <select id="yearSelect" onchange="changeYear()"></select>
                <button onclick="nextYear()">&rarr;</button>
            </div>
        </div>

        <div class="days" id="dayNames">
            <div>Sunday</div>
            <div>Monday</div>
            <div>Tuesday</div>
            <div>Wednesday</div>
            <div>Thursday</div>
            <div>Friday</div>
            <div>Saturday</div>
        </div>

        <div class="days" id="days"></div>
    </div>

    <div class="sidebar">
        <h3 id="selectedDateTitle">Select a day</h3>

        <input id="taskInput" placeholder="New task">
        <input type="color" id="colorPicker" value="#4a90e2">
        <button onclick="addTask()">Add</button>

        <div id="taskList"></div>
    </div>

</div>

<script src="index.js"></script>
</body>
</html>
