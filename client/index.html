<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calendar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h3>Calendar</h3>

    <div id="choice-banner">
        <span onclick="showWeather()">Weather</span>
        <span onclick="showTasks()">Task</span>
        <span onclick="toggleTheme()">Theme</span>
    </div>

    <div class="auth-buttons" id="authArea"></div>
</header>

<div class="container">

    <div class="calendar">

        <h2 id="title"></h2>

        <div id="MMYY-selection">
            <div>
                <button onclick="prev()">&larr;</button>
                <select id="monthSelect" onchange="changeMonth()"></select>
                <button onclick="next()">&rarr;</button>
            </div>

            <div>
                <button onclick="prevYear()">&larr;</button>
                <select id="yearSelect" onchange="changeYear()"></select>
                <button onclick="nextYear()">&rarr;</button>
            </div>
        </div>

        <div class="days" id="dayNames">
            <div>Sunday</div>
            <div>Monday</div>
            <div>Tuesday</div>
            <div>Wednesday</div>
            <div>Thursday</div>
            <div>Friday</div>
            <div>Saturday</div>
        </div>

        <div class="days" id="days"></div>
    </div>

    <div class="sidebar">
        <div id="taskPanel">
            <h3 id="selectedDateTitle">Select a day</h3>

            <input id="taskInput" placeholder="New task">
            <input type="color" id="colorPicker" value="#4a90e2">
            <button onclick="addTask()">Add</button>

            <div id="taskList"></div>
        </div>

        <div id="weatherPanel" style="display:none;">
            <h3>5-Day Weather Forecast</h3>
            <div id="weatherStatus">Click Weather to load forecast.</div>
            <div id="weatherList"></div>
        </div>
    </div>

</div>

<script src="index.js"></script>
</body>
</html>
