<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>WeatherSync Calendar - Login</title>
        <link rel="stylesheet" href="style-login.css">
    </head>
    <body>
        <div class="login-box">
            <h3>Welcome</h3>

            <form id="loginForm">
                <div class="login-input">
                    <input type="email" id="loginEmail" class="mytext" placeholder="Email" required>
                </div>

                <div class="login-input password-wrapper">
                    <input type="password" id="loginPassword" class="mytext" placeholder="Password" required>
                </div>

                <div class="show-password-row">
                    <label>
                        <input type="checkbox" id="showLoginPassword">
                        Show password
                    </label>
                </div>

                <div>
                    <a href="register.html" class="login-box-account">Forgot Password?</a>
                </div>

                <a href="register.html" class="login-box-account create-link">Create an account?</a>

                <button type="submit" class="auth-submit-btn">Sign In</button>
            </form>
        </div>

        <script>
const loginPassword = document.getElementById("loginPassword");
const showLoginPassword = document.getElementById("showLoginPassword");
const loginForm = document.getElementById("loginForm");

showLoginPassword.addEventListener("change", function () {
    loginPassword.type = this.checked ? "text" : "password";
});

loginForm.addEventListener("submit", async function (event) {
    event.preventDefault();

    const email = document.getElementById("loginEmail").value.trim();
    const password = loginPassword.value;

    try {
        const response = await fetch("http://localhost:5000/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                password
            })
        });

        const data = await response.json();
        console.log("LOGIN RESPONSE:", data);

        if (!response.ok) {
            alert(data.message || "Login failed");
            return;
        }

        localStorage.setItem("token", data.token);

        if (data.user) {
            localStorage.setItem("currentCustomer", JSON.stringify(data.user));
        }

        alert("Login successful");
        window.location.href = "index.html";
    } catch (error) {
        console.error("LOGIN ERROR:", error);
        alert("Could not connect to backend");
    }
});
</script>
    </body>
</html>
