<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Calendar</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <h3>Calendar</h3>
            <div id="choice-banner">
                <span>Reminder</span>
                <span>Weather</span>
                <span>Task</span>
                <span>Theme</span>
            </div>
            <div>
                <button class="signin-up-btn"><a href="login.html">Sign In</a></button>
                <button class="signin-up-btn"><a href="register.html">Register</a></button>
            </div>
        </header>
        <div class="container">
            <div class="calendar">
                <MonthYear id="MMYY-selection">
                    <div>
                        <button>&larr;</button>
                        <span>Month</span>
                        <button>&rarr;</button>
                    </div>

                    <div>
                        <button>&larr;</button>
                        <span>Year</span>
                        <button>&rarr;</button>
                    </div>
                </MonthYear>

                <div class="days" id="dayNames">
                    <div>Sunday</div>
                    <div>Monday</div>
                    <div>Tuesday</div>
                    <div>Wednesday</div>
                    <div>Thursday</div>
                    <div>Friday</div>
                    <div>Saturday</div>
                </div>
            </div>

            <div class="sidebar">
                <h3>Select a day</h3>
                <input id="taskInput" placeholder="New task">
                <input type="color" id="colorPicker" value="#4a90e2">
                <button onclick="addTask()">Add</button>
                <div id="taskList"></div>
            </div>
        </div>
    </body>
</html>
