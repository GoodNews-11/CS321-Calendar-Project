<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SICS Calendar</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Calendar</h1>

  <div>
    <button>Sign Up</button>
    <button>Sign In</button>
    <button onclick="toogleDark()">🌙</button>
  </div>
</header>

<div class="container">

  <!-- Calendar -->
  <div class="calendar">

    <!-- Navigation -->
    <div class="nav">
      <button>◀</button>

      <select id="monthSelect"></select>
      <select id="yearSelect"></select>

      <button>▶</button>
    </div>

    <h2 id="title"></h2>
    <div class="days">
        <div>Sunday</div>
        <div>Monday</div>
        <div>Tuesday</div>
        <div>Wednesday</div>
        <div>Thursday</div>
        <div>Friday</div>
        <div>Saturday</div>
    </div>

  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <h3 id="selectedDateTitle">Select a day</h3>
    <input type="color" id="colorPicker" value="#4a90e2">
    <input id="taskInput" placeholder="New task">
    <button>Add</button>

    <div id="taskList"></div>

  </div>

</div>
<script src="index.js"></script>
</body>
</html>
